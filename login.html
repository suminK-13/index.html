<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat | Log In</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="chat.css">
    <style>
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% 50%, rgba(92, 140, 240, 0.05) 0%, transparent 50%);
        }
        .login-box {
            background-color: var(--bg-sidebar);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--border-light);
        }
        .login-logo {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(92, 140, 240, 0.4));
        }
        .ghost-logo {
            color: #0d0d0d;
            -webkit-text-stroke: 1.5px #ff1a1a;
            filter: drop-shadow(0 5px 15px rgba(255, 26, 26, 0.8));
        }
        .login-box h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        .login-box p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .input-group input {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(92, 140, 240, 0.2);
        }
        .primary-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .primary-btn:hover {
            background-color: var(--accent-hover);
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        #phoneDisplay {
            font-weight: 600;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <!-- Step 1: Phone Number -->
            <div id="step1" class="step active">
                <i class="fa-solid fa-ghost login-logo ghost-logo"></i>
                <h1>Sign in to SecureChat</h1>
                <p>Please confirm your country code and enter your phone number.</p>
                
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phoneInput" placeholder="+1 234 567 8900" autocomplete="off">
                </div>
                
                <button class="primary-btn" id="nextBtn">NEXT</button>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="step2" class="step">
                <i class="fa-solid fa-shield-halved login-logo" style="color: var(--text-secure)"></i>
                <h1>12345</h1>
                <p>We've sent a simulated code to <br><span id="phoneDisplay"></span>. <br>Please enter the code <b>12345</b> below.</p>
                
                <div class="input-group">
                    <label>Verification Code</label>
                    <input type="text" id="otpInput" placeholder="Code" maxlength="5" autocomplete="off">
                </div>
                
                <button class="primary-btn" id="verifyBtn">VERIFY</button>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
