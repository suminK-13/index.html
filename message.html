<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Sudden Thought...</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="message.css">
</head>
<body>
    <!-- Interactive Background Canvas -->
    <canvas id="starfield"></canvas>

    <div id="openScreen" class="open-screen">
        <button id="openBtn" class="open-btn">Mektubu Aç</button>
    </div>

    <div class="envelope-container" id="envelope" style="display: none;">
        <div class="glow"></div>
        <div class="message-card">
            <h1 class="hidden-text">Canım Kaan,</h1>
            <p class="hidden-text">Senin için biraz özel bir şey yapmak istedim...</p>
            <p class="hidden-text">Umarım günün huzurlu ve çok güzel geçiyordur. En güzel mutluluklar seninle olsun.</p>
            <p class="hidden-text sign-off">— Aslanım</p>
        </div>
    </div>

    <!-- Script -->
    <script src="message.js"></script>
</body>
</html>
