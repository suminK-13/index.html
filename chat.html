<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat | End-to-End Encrypted</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Chats List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?img=68" alt="Profile" class="avatar">
                    <div class="user-info">
                        <h2 id="myProfileName">My Profile</h2>
                        <span class="status secure"><i class="fa-solid fa-shield-halved"></i> Secured</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="icon-btn" id="logoutBtn" title="Log Out"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-bar" style="display: flex; gap: 5px;">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="contactSearchInput" placeholder="Add friend's number...">
                    <button class="icon-btn" id="addContactBtn" style="width: auto; padding: 0 10px; border-radius: 12px; font-size: 0.9rem; background: var(--accent-color); color: white;">Add</button>
                </div>
            </div>

            <div class="chat-list" id="chatList">
                <!-- Dynamically populated online users will go here -->
                <div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                    Waiting for friends to come online...
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area" id="mainChatArea" style="display: none;">
            <header class="chat-header">
                <div class="chat-header-info">
                    <img src="https://i.pravatar.cc/150?img=32" alt="Avatar" class="avatar">
                    <div class="contact-details">
                        <h2 id="activeChatName">Select a chat</h2>
                        <div class="status-indicator">
                            <span class="online-dot"></span> Online
                        </div>
                    </div>
                </div>
                
                <div class="security-badge" id="securityBadge">
                    <i class="fa-solid fa-lock"></i>
                    <span>End-to-End Encrypted</span>
                </div>

                <div class="chat-actions">
                    <button class="icon-btn"><i class="fa-solid fa-phone"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-video"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </header>

            <div class="chat-history" id="chatHistory">
                <div class="encryption-notice">
                    <i class="fa-solid fa-shield-check"></i>
                    <p>Messages are end-to-end encrypted. Only you and this contact can read them.</p>
                </div>
                <!-- Dynamic messages go here -->
            </div>

            <div class="chat-input-area">
                <div class="attachment-menu">
                    <button class="icon-btn" title="Attach File"><i class="fa-solid fa-paperclip"></i></button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Write a secure message...">
                    <button class="icon-btn emoji-btn"><i class="fa-regular fa-face-smile"></i></button>
                </div>
                <button class="send-btn" id="sendBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
                <!-- Mic button that swaps with send button logic can go here -->
                <button class="mic-btn" id="micBtn" style="display: none;">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- Socket.io Library -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="chat.js"></script>
</body>
</html>
